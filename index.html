<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            /* เอฟเฟกต์กระพริบไล่ระดับให้เหมือนข้อความวิ่งวนแบบในคลิป */
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const container = document.getElementById('heart');
        let total = 42; // จำนวนคำเรียงรอบรูปหัวใจให้แน่นสวยงามแบบในคลิป
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            // สูตรคำนวณเส้นโค้งรูปหัวใจ
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 140 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 140 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            
            // หน่วงเวลาการกระพริบให้วิ่งไล่ระดับกันเหมือนระลอกคลื่น
            span.style.animationDelay = (i * 0.05) + 's';
            container.appendChild(span);
        }
    </script>

</body>
</html>
