<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            color: #ff69b4;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .heart-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        .heart-item {
            position: absolute;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
            /* ให้วิ่งวนตามหัวใจและขยับนุ่มนวล */
            animation: moveAlongHeart 6s linear infinite;
        }
        @keyframes moveAlongHeart {
            0% { opacity: 0.3; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.9); }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const container = document.getElementById('heart');
        let total = 22; // จำนวนคำที่เรียงตามเส้นหัวใจ
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            // คำนวณตำแหน่งตามเส้นโค้งหัวใจ
            let t = (i / total) * Math.PI * 2;
            let x = 140 + 110 * (16 * Math.sin(t)**3) / 16;
            let y = 140 - 110 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            
            // ให้แต่ละตัววิ่งไล่ระดับเวลากัน
            span.style.animationDelay = (i * (6 / total)) + 's';
            container.appendChild(span);
        }
    </script>

</body>
</html>
