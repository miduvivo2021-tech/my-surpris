<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            color: #ff69b4;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .heart-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        .heart-container span {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            /* ทำให้วิ่งวนตามเส้นทาง */
            animation: rotateHeart 8s linear infinite;
            transform-origin: center;
        }
        @keyframes rotateHeart {
            0% {
                transform: rotate(0deg) translate(130px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translate(130px) rotate(-360deg);
            }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const container = document.getElementById('heart');
        let total = 24; // จำนวนคำที่วิ่งวน
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.innerHTML = "ຮັກຫມີພູ❤️";
            //กระจายตำแหน่งให้วิ่งไล่เลี่ยกัน
            let delay = (i / total) * 8;
            span.style.animationDelay = `-${delay}s`;
            container.appendChild(span);
        }
    </script>

</body>
</html>
