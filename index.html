<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Surprise</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            cursor: pointer;
        }
        .tap-text {
            font-size: 1.5rem;
            animation: pulse 1.5s infinite;
            text-align: center;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="tap-text" id="promptText">แตะหน้าจอเพื่อเริ่ม ❤️</div>

    <!-- ตัวอย่างการใส่ไฟล์เสียง -->
    <audio id="bgMusic" loop>
        <source src="your-audio-file.mp3" type="audio/mpeg">
    </audio>

    <script>
        const body = document.body;
        const music = document.getElementById('bgMusic');
        const promptText = document.getElementById('promptText');

        body.addEventListener('click', () => {
            // เล่นเพลงเมื่อมีการแตะหน้าจอครั้งแรก
            music.play().then(() => {
                promptText.style.display = 'none'; // ซ่อนข้อความเมื่อแตะแล้ว
            }).catch(error => {
                console.log("Audio play blocked", error);
            });
        });
    </script>

</body>
</html>
