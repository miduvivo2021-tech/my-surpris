<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            color: #ff69b4;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .heart-container {
            position: relative;
            width: 320px;
            height: 320px;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            white-space: nowrap;
            /* วิ่งวนเป็นวงรอบรูปหัวใจอย่างลื่นไหล */
            animation: moveHeartPath 4s linear infinite;
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>

    <script>
        const container = document.getElementById('heart');
        
        // จุดพิกัดเส้นโค้งรูปหัวใจ
        let points = [];
        let totalPoints = 24;
        
        for (let i = 0; i < totalPoints; i++) {
            let t = (i / totalPoints) * Math.PI * 2;
            let x = 140 + 110 * (16 * Math.sin(t)**3) / 16;
            let y = 140 - 110 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            points.push({x: x, y: y});
        }

        // สร้างตัวหนังสือวิ่งสลับตำแหน่งตามพิกัดหัวใจ
        let textCount = 12;
        for (let i = 0; i < textCount; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            let keyframes = [];
            for (let j = 0; j < points.length; j++) {
                let pIndex = (i + j) % points.length;
                let percent = (j / points.length) * 100;
                keyframes.push({
                    transform: `translate(${points[pIndex].x}px, ${points[pIndex].y}px)`
                });
            }
            
            let anim = span.animate(keyframes, {
                duration: 8000,
                iterations: Infinity
            });
            
            container.appendChild(span);
        }
    </script>

</body>
</html>
