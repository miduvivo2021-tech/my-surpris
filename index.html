<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            color: #ff69b4;
            font-family: sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .heart-item {
            position: absolute;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            transition: all 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
        }
        .heart-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }
        .center-heart {
            position: absolute;
            font-size: 24px;
            text-align: center;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.12); }
            100% { transform: scale(1); }
        }
        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            opacity: 0.7;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container" id="canvas">
        <div class="center-heart">
            ຮັກຫມີພູ ❤️<br>
            <span style="font-size: 14px;">14/2/2026</span>
        </div>
        <div class="instruction">ແตะหรือคลิกที่หน้าจอเพื่อกระจายความรัก ❤️</div>
    </div>

    <script>
        const container = document.getElementById('canvas');
        
        // รายการข้อความและลิงก์รูปภาพ (ตรงคำว่า 'ใส่ลิงก์รูปตรงนี้' ให้เปลี่ยนเป็นลิงก์รูปของคุณ เช่น 'photo1.jpg')
        const contents = [
            "ຮັກຫມີພູ ❤️", 
            "ຮັກຫລາຍໆ", 
            "Happy Valentine's Day", 
            "14/2/2026", 
            "<img src='Screenshot.jpeg'>"
            "<img src='Screenshot.jpeg'>"

            
        
        let items = [];
        let isScattered = false;

        let total = 50;
        for (let i = 0; i < total; i++) {
            let t = (i / total) * Math.PI * 2;
            let hx = 150 * (16 * Math.sin(t)**3) / 16;
            let hy = -150 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            let div = document.createElement('div');
            div.className = 'heart-item';
            div.innerHTML = contents[Math.floor(Math.random() * contents.length)];
            
            div.dataset.heartX = hx;
            div.dataset.heartY = hy;
            div.dataset.scatterX = (Math.random() - 0.5) * (window.innerWidth * 0.85);
            div.dataset.scatterY = (Math.random() - 0.5) * (window.innerHeight * 0.85);
            
            div.style.transform = `translate(${hx}px, ${hy}px)`;
            container.appendChild(div);
            items.push(div);
        }

        document.body.addEventListener('click', () => {
            isScattered = !isScattered;
            items.forEach(item => {
                if (isScattered) {
                    let sx = item.dataset.scatterX;
                    let sy = item.dataset.scatterY;
                    let rot = (Math.random() - 0.5) * 40;
                    item.style.transform = `translate(${sx}px, ${sy}px) rotate(${rot}deg)`;
                    item.style.opacity = '0.9';
                } else {
                    let hx = item.dataset.heartX;
                    let hy = item.dataset.heartY;
                    item.style.transform = `translate(${hx}px, ${hy}px) rotate(0deg)`;
                    item.style.opacity = '1';
                }
            });
        });
    </script>

</body>
</html>
