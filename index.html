<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Surprise</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #ff69b4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            cursor: pointer;
            position: relative;
        }

        /* --- โครงสร้างรูปหัวใจตัวหนังสือข้อความ (แบบต้นฉบับ) --- */
        .heart-shape-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text-heart {
            position: absolute;
            font-size: 14px;
            color: #ff8da1;
            text-shadow: 0 0 10px #ff69b4;
            white-space: nowrap;
            animation: heartbeat 1.2s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* --- ข้อความแตะหน้าจอ --- */
        .tap-text {
            position: absolute;
            bottom: 80px;
            font-size: 1.2rem;
            color: #ff69b4;
            animation: pulse 1.5s infinite;
            text-align: center;
            z-index: 50;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- รูปภาพที่ลอยพุ่งออกมาตอนกดหน้าจอ --- */
        .floating-photo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.9);
            opacity: 0;
            animation: floatOut 4s linear forwards;
            object-fit: cover;
            z-index: 100;
        }

        @keyframes floatOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            15% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--move-x)), calc(-50% + var(--move-y))) scale(1.1);
            }
        }
    </style>
</head>
<body>

    <div class="heart-shape-container" id="heartContainer">
        <div class="text-heart" style="transform: translate(0px, -90px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(-50px, -60px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(50px, -60px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(-90px, -20px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(90px, -20px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(-70px, 30px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(70px, 30px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(-40px, 80px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(40px, 80px);">รักกดมีพู ❤️</div>
        <div class="text-heart" style="transform: translate(0px, 120px);">รักกดมีพู ❤️</div>
    </div>

    <div class="tap-text" id="promptText">แตะหน้าจอ ❤️</div>

    <script>
        const promptText = document.getElementById('promptText');
        
        // รายชื่อรูปภาพที่จะสุ่มลอยออกมา (สามารถเปลี่ยนลิงก์รูปภาพของคุณเองได้ตรงนี้)
        const photoUrls = [
            'https://i.imgur.com/bM9y4oP.jpeg',
            'https://i.imgur.com/2i9oGfP.jpeg',
            'https://i.imgur.com/f0C3rJj.jpeg',
            'https://i.imgur.com/L2nU3vD.jpeg'
        ];

        // ทุกครั้งที่แตะหน้าจอ จะมีรูปภาพพุ่งกระจายออกมาเพิ่มขึ้น
        document.body.addEventListener('click', (e) => {
            // ซ่อนข้อความเตือนเมื่อกดครั้งแรก
            if (promptText.style.display !== 'none') {
                promptText.style.display = 'none';
            }

            // สร้างรูปภาพพุ่งออกมาทีละ 3 รูปต่อการแตะ 1 ครั้ง เพื่อความอลังการ
            for (let i = 0; i < 3; i++) {
                createFloatingPhoto();
            }
        });

        function createFloatingPhoto() {
            const photo = document.createElement('img');
            photo.src = photoUrls[Math.floor(Math.random() * photoUrls.length)];
            photo.classList.add('floating-photo');
            
            // สุ่มทิศทางและระยะทางที่รูปจะพุ่งออกไปรอบ ๆ หน้าจอ
            const moveX = (Math.random() - 0.5) * 700;
            const moveY = (Math.random() - 0.5) * 700;
            photo.style.setProperty('--move-x', `${moveX}px`);
            photo.style.setProperty('--move-y', `${moveY}px`);

            document.body.appendChild(photo);

            // ลบรูปทิ้งเมื่อแอนิเมชันจบ เพื่อป้องกันเครื่องหน่วง
            photo.addEventListener('animationend', () => {
                photo.remove();
            });
        }
    </script>

</body>
</html>
