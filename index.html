<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }
        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }

        /* สไตล์สำหรับรูปภาพและข้อความที่จะกระจายตัว */
        .scatter-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
            left: 50%;
            top: 50%;
            pointer-events: none;
        }
        .scatter-item img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.9);
            display: block;
        }
        /* ข้อความบอกให้แตะหน้าจอ */
        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ff69b4;
            font-size: 13px;
            opacity: 0.7;
            z-index: 20;
            letter-spacing: 1px;
            animation: pulseText 1.5s infinite ease-in-out;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- เพลงประกอบจากวิดีโอตัวอย่าง -->
    <audio id="bg-music" autoplay loop>
        <source src="https://cdns.tiangong.world/audio/romantic_bgm.mp3" type="audio/mpeg">
        <source src="https://actions.google.com/sounds/v1/ambiences/romantic_music.ogg" type="audio/ogg">
    </audio>

    <div class="heart-container" id="heart"></div>
    <div id="scatter-layer"></div>
    <div class="instruction">แตะหน้าจอ ❤️</div>

    <script>
        // 1. สร้างหัวใจตรงกลาง
        const container = document.getElementById('heart');
        let total = 42;
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 140 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 140 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            span.style.animationDelay = (i * 0.05) + 's';
            container.appendChild(span);
        }

        // 2. สร้างรายการข้อความและรูปภาพ (เปลี่ยนชื่อไฟล์รูปให้ตรงกับของคุณ เช่น Screenshot.jpeg)
        const scatterLayer = document.getElementById('scatter-layer');
        const contents = [
            "ຮັກຫມີພູ❤️", 
            "ຮັກຫມີພູ❤️", 
            "<img src='Screenshot.jpeg'>"
        ];
        
        let scatterItems = [];
        let count = 40;

        for (let i = 0; i < count; i++) {
            let div = document.createElement('div');
            div.className = 'scatter-item';
            div.innerHTML = contents[Math.floor(Math.random() * contents.length)];
            
            let angle = Math.random() * Math.PI * 2;
            let distance = 80 + Math.random() * (window.innerWidth * 0.38);
            let rx = Math.cos(angle) * distance;
            let ry = Math.sin(angle) * distance;
            
            div.dataset.x = rx;
            div.dataset.y = ry;
            
            div.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
            scatterLayer.appendChild(div);
            scatterItems.push(div);
        }

        // 3. ระบบเล่นเพลงอัตโนมัติ และแตะหน้าจอแสดงผล 1 วินาทีแล้วหายไป
        const music = document.getElementById('bg-music');
        let hideTimeout;

        // พยายามสั่งเล่นเพลงทันทีที่เข้าเว็บ
        window.addEventListener('load', () => {
            music.play().catch(e => {
                console.log("Autoplay blocked, waiting for user interaction");
            });
        });

        document.body.addEventListener('click', () => {
            // เผื่อกรณีเบราว์เซอร์บล็อกการเล่นอัตโนมัติ จะเล่นทันทีที่กดแตะครั้งแรก
            if (music.paused) {
                music.play();
            }

            // กระจายรูปและข้อความออก
            scatterItems.forEach(item => {
                let x = item.dataset.x;
                let y = item.dataset.y;
                let rot = (Math.random() - 0.5) * 45;
                item.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(1) rotate(${rot}deg)`;
                item.style.opacity = '1';
            });

            // ตั้งเวลาให้จางหายกลับไปใน 1 วินาทีเป๊ะๆ
            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                scatterItems.forEach(item => {
                    item.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
                    item.style.opacity = '0';
                });
            }, 1000);
        });
    </script>

</body>
</html>
