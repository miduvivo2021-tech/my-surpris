<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Surprise</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            cursor: pointer;
        }

        /* --- ข้อความแตะหน้าจอ --- */
        .tap-text {
            font-size: 1.5rem;
            color: #ff69b4;
            animation: pulse 1.5s infinite;
            text-align: center;
            z-index: 50;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- พื้นที่แสดงเอฟเฟกต์ --- */
        #surprise-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            overflow: hidden;
        }

        /* --- หัวใจวนๆ ตรงกลาง --- */
        .heart-orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            clip-path: path('M12 21.583l-10.95-11.726c-1.264-1.359-1.264-3.563 0-4.922 1.264-1.359 3.315-1.359 4.579 0l6.371 6.831 6.371-6.831c1.264-1.359 3.315-1.359 4.579 0 1.264 1.359 1.264 3.563 0 4.922l-10.95 11.726z');
            border: 2px solid rgba(255, 105, 180, 0.7);
            animation: rotateOrbit 20s linear infinite;
            box-shadow: 0 0 20px #ff69b4;
            display: none; /* ซ่อนไว้ก่อนจนกว่าจะกด */
        }
        @keyframes rotateOrbit {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* --- รูปภาพที่เลื่อน/ลอยออกมา --- */
        .floating-photo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
            opacity: 0;
            animation: floatOut 4s linear forwards;
            object-fit: cover;
            z-index: 30;
        }
        @keyframes floatOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }
            20% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--move-x)), calc(-50% + var(--move-y))) scale(1);
            }
        }
    </style>
</head>
<body>

    <div class="tap-text" id="promptText">แตะหน้าจอเพื่อเริ่ม ❤️</div>

    <div id="surprise-area">
        <div class="heart-orbit" id="heartOrbit"></div>
    </div>

    <script>
        const promptText = document.getElementById('promptText');
        const heartOrbit = document.getElementById('heartOrbit');
        const surpriseArea = document.getElementById('surprise-area');
        let started = false;

        // รายชื่อรูปภาพ (สามารถเปลี่ยนลิงก์รูปภาพของคุณเองตรงนี้ได้เลย)
        const photoUrls = [
            'https://i.imgur.com/bM9y4oP.jpeg',
            'https://i.imgur.com/2i9oGfP.jpeg',
            'https://i.imgur.com/f0C3rJj.jpeg',
            'https://i.imgur.com/L2nU3vD.jpeg'
        ];

        document.body.addEventListener('click', () => {
            if (!started) {
                started = true;
                promptText.style.display = 'none'; // ซ่อนข้อความเริ่มต้น
                heartOrbit.style.display = 'block'; // แสดงหัวใจวนๆ
                
                // เริ่มปล่อยรูปภาพลอยออกมาเรื่อยๆ ทุกๆ 1.2 วินาที
                setInterval(createFloatingPhoto, 1200);
            }
        });

        function createFloatingPhoto() {
            const photo = document.createElement('img');
            photo.src = photoUrls[Math.floor(Math.random() * photoUrls.length)];
            photo.classList.add('floating-photo');
            
            // สุ่มทิศทางระยะห่างที่รูปจะลอยพุ่งออกมา
            const moveX = (Math.random() - 0.5) * 500;
            const moveY = (Math.random() - 0.5) * 500;
            photo.style.setProperty('--move-x', `${moveX}px`);
            photo.style.setProperty('--move-y', `${moveY}px`);

            surpriseArea.appendChild(photo);

            // ลบรูปทิ้งหลังจบแอนิเมชันเพื่อไม่ให้กินแรมเครื่อง
            photo.addEventListener('animationend', () => {
                photo.remove();
            });
        }
    </script>

</body>
</html>
