<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }
        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }
