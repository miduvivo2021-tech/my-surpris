<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }
        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }

        /* สไตล์สำหรับรูปภาพและข้อความที่กระจายและเลื่อนลงมา */
        .scatter-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            transition: all 1.8s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
        }
        .scatter-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 10px rgba(255, 105, 180, 0.8);
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>
    <div id="scatter-layer"></div>

    <script>
        // 1. สร้างรูปหัวใจหลักตรงกลาง
        const container = document.getElementById('heart');
        let total = 42;
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 140 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 140 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            span.style.animationDelay = (i * 0.05) + 's';
            container.appendChild(span);
        }

        // 2. สร้างข้อความ "ຮັກຫມີພູ❤️" และรูปภาพของคุณให้กระจายเลื่อนลงมาเยอะๆ
        const scatterLayer = document.getElementById('scatter-layer');
        const contents = [
            "ຮັກຫມີພູ❤️", 
            "ຮັກຫມີພູ❤️", 
            "<img src='Screenshot.jpeg'>"
        ];
        
        let scatterItems = [];
        let count = 50; // จำนวนชิ้นที่จะกระจายออกมาเยอะๆ

        for (let i = 0; i < count; i++) {
            let div = document.createElement('div');
            div.className = 'scatter-item';
            div.innerHTML = contents[Math.floor(Math.random() * contents.length)];
            
            let rx = (Math.random() - 0.5) * (window.innerWidth * 0.9);
            let ry = (Math.random() - 0.5) * (window.innerHeight * 0.9);
            
            div.dataset.x = rx;
            div.dataset.y = ry;
            
            div.style.transform = `translate(0px, 0px) scale(0.2)`;
            scatterLayer.appendChild(div);
            scatterItems.push(div);
        }

        // 3. แตะหน้าจอเพื่อให้รูปและข้อความเลื่อนกระจายออกมา
        let isOpened = false;
        document.body.addEventListener('click', () => {
            isOpened = !isOpened;
            scatterItems.forEach(item => {
                if (isOpened) {
                    let x = item.dataset.x;
                    let y = item.dataset.y;
                    let rot = (Math.random() - 0.5) * 40;
                    item.style.transform = `translate(${x}px, ${y}px) scale(1) rotate(${rot}deg)`;
                    item.style.opacity = '0.95';
                } else {
                    item.style.transform = `translate(0px, 0px) scale(0.2)`;
                    item.style.opacity = '0';
                }
            });
        });
    </script>

</body>
</html>
