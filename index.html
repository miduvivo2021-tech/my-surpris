<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }
        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }

        .scatter-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
            left: 50%;
            top: 50%;
            pointer-events: none;
        }
        .scatter-item img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.9);
            display: block;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 2;
            animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.2);
                opacity: 0;
            }
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ff69b4;
            font-size: 13px;
            opacity: 0.7;
            z-index: 20;
            letter-spacing: 1px;
            animation: pulseText 1.5s infinite ease-in-out;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- ซ่อนเสียงพลุไว้เล่นตอนพลุระเบิด -->
    <audio id="firework-sound" preload="auto">
        <source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_12d26f04b1.mp3?filename=firework-explosion-7129.mp3" type="audio/mpeg">
    </audio>

    <div class="heart-container" id="heart"></div>
    <div id="scatter-layer"></div>
    <div class="instruction">แตะหน้าจอเพื่อดูเซอร์ไพรส์ ❤️</div>

    <script>
        const container = document.getElementById('heart');
        let total = 42;
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 140 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 140 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            span.style.animationDelay = (i * 0.05) + 's';
            container.appendChild(span);
        }

        const scatterLayer = document.getElementById('scatter-layer');
        const contents = [
            "ຮັກຫມີພູ❤️", 
            "ຮັກຫມີພູ❤️", 
            "<img src='Screenshot.jpeg'>"
        ];
        
        let scatterItems = [];
        let count = 40;

        for (let i = 0; i < count; i++) {
            let div = document.createElement('div');
            div.className = 'scatter-item';
            div.innerHTML = contents[Math.floor(Math.random() * contents.length)];
            
            let angle = Math.random() * Math.PI * 2;
            let distance = 80 + Math.random() * (window.innerWidth * 0.38);
            let rx = Math.cos(angle) * distance;
            let ry = Math.sin(angle) * distance;
            
            div.dataset.x = rx;
            div.dataset.y = ry;
            
            div.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
            scatterLayer.appendChild(div);
            scatterItems.push(div);
        }

        // ฟังก์ชันเล่นเสียงพลุ (จะเล่นเสียงเมื่อมีการแตะหน้าจอหรือใช้งาน)
        function playSound() {
            let sound = document.getElementById('firework-sound');
            if (sound) {
                let clone = sound.cloneNode(); // โคลนเสียงเพื่อให้เล่นซ้อนกันหลายๆ ลูกได้เวลาพลุยิงรัวๆ
                clone.volume = 0.4;
                clone.play().catch(e => console.log("Audio play blocked"));
            }
        }

        function createFireworks(clientX, clientY) {
            const colors = ['#ff69b4', '#ff1493', '#ff6b81', '#ff4757', '#ffa502', '#ffffff', '#eccc68'];
            const particleCount = 25;

            for (let i = 0; i < particleCount; i++) {
                let fw = document.createElement('div');
                fw.className = 'firework';
                fw.style.left = clientX + 'px';
                fw.style.top = clientY + 'px';
                fw.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let angle = Math.random() * Math.PI * 2;
                let distance = 50 + Math.random() * 120;
                let tx = Math.cos(angle) * distance;
                let ty = Math.sin(angle) * distance;
                
                fw.style.setProperty('--tx', tx + 'px');
                fw.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(fw);

                setTimeout(() => {
                    fw.remove();
                }, 800);
            }
        }

        // พลุออโต้ฉากหลัง (จะไม่เปิดเสียงอัตโนมัติเพื่อป้องกันเบราว์เซอร์บล็อกเสียง รอดูตอนผู้ใช้แตะหน้าจอครั้งแรก)
        setInterval(() => {
            let randomX = Math.random() * window.innerWidth;
            let randomY = Math.random() * (window.innerHeight * 0.6);
            createFireworks(randomX, randomY);
        }, 1500);

        let hideTimeout;
        document.body.addEventListener('click', (e) => {
            // เมื่อผู้ใช้แตะหน้าจอ จะเล่นเสียงพลุพร้อมกับยิงพลุและกระจายรูป
            playSound();

            scatterItems.forEach(item => {
                let x = item.dataset.x;
                let y = item.dataset.y;
                let rot = (Math.random() - 0.5) * 45;
                item.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(1) rotate(${rot}deg)`;
                item.style.opacity = '1';
            });

            let posX = e.clientX || window.innerWidth / 2;
            let posY = e.clientY || window.innerHeight / 2;
            createFireworks(posX, posY);

            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                scatterItems.forEach(item => {
                    item.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
                    item.style.opacity = '0';
                });
            }, 2000);
        });
    </script>

</body>
</html>
