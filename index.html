<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Surprise</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
        }
        .tap-text {
            font-size: 1.5rem;
            color: #ff69b4;
            animation: pulse 1.5s infinite;
            text-align: center;
            cursor: pointer;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="tap-text" id="promptText">แตะหน้าจอเพื่อเริ่ม ❤️</div>

    <script>
        const promptText = document.getElementById('promptText');
        
        promptText.addEventListener('click', () => {
            // เมื่อกดแล้วเปลี่ยนข้อความหรือซ่อนเพื่อจำลองการเข้าไปหน้าข้างใน
            promptText.innerHTML = "✨ รักนะมีพู ❤️ ✨";
            promptText.style.cursor = "default";
        });
    </script>

</body>
</html>
