<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* เอฟเฟกต์ดาวตกและหัวใจตกฉากหลังแบบพอดีตา ไม่ลายตา */
        .falling-object {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            animation: fallDown linear forwards;
        }
        @keyframes fallDown {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }
            15% {
                opacity: 0.8;
            }
            85% {
                opacity: 0.8;
            }
            100% {
                transform: translateY(105vh) rotate(360deg);
                opacity: 0;
            }
        }

        .heart-container {
            position: relative;
            width: 350px;
            height: 350px;
            animation: pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            animation: waveGlow 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
        @keyframes waveGlow {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 10px #ff69b4; }
        }

        .scatter-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0;
            z-index: 5;
            text-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
            left: 50%;
            top: 50%;
            pointer-events: none;
        }
        .scatter-item img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 50%;
            border: 2px solid #ff69b4;
            box-shadow: 0 0 12px rgba(255, 105, 180, 0.9);
            display: block;
        }

        .firework {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 3;
            animation: explode 0.8s ease-out forwards;
        }
        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) scale(0.2);
                opacity: 0;
            }
        }

        .instruction {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            color: #ff69b4;
            font-size: 13px;
            opacity: 0.7;
            z-index: 20;
            letter-spacing: 1px;
            animation: pulseText 1.5s infinite ease-in-out;
        }
        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heart"></div>
    <div id="scatter-layer"></div>
    <div class="instruction">แตะหน้าจอเพื่อดูเซอร์ไพรส์ ❤️</div>

    <script>
        // ระบบเสียงพลุแบบเดิม (เสียงสั้นปังๆ สมจริง ไม่ลากยาว)
        let audioCtx = null;
        function playFireworkSound() {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
                let osc = audioCtx.createOscillator();
                let gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.4);
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
            } catch (e) {
                console.log("Audio error", e);
            }
        }

        // 1. สร้างหัวใจตรงกลาง
        const container = document.getElementById('heart');
        let total = 42;
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 140 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 140 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            span.style.animationDelay = (i * 0.05) + 's';
            container.appendChild(span);
        }

        // 2. สร้างรายการข้อความ/รูปภาพรอบนอก
        const scatterLayer = document.getElementById('scatter-layer');
        const contents = [
            "ຮັກຫມີພູ❤️", 
            "ຮັກຫມີພູ❤️", 
            "<img src='Screenshot.jpeg'>"
        ];
        
        let scatterItems = [];
        let count = 40;
        for (let i = 0; i < count; i++) {
            let div = document.createElement('div');
            div.className = 'scatter-item';
            div.innerHTML = contents[Math.floor(Math.random() * contents.length)];
            
            let angle = Math.random() * Math.PI * 2;
            let distance = 80 + Math.random() * (window.innerWidth * 0.38);
            let rx = Math.cos(angle) * distance;
            let ry = Math.sin(angle) * distance;
            
            div.dataset.x = rx;
            div.dataset.y = ry;
            div.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
            scatterLayer.appendChild(div);
            scatterItems.push(div);
        }

        // ฟังก์ชันสร้างพลุ
        function createFireworks(clientX, clientY) {
            const colors = ['#ff69b4', '#ff1493', '#ff6b81', '#ff4757', '#ffa502', '#ffffff', '#eccc68'];
            const particleCount = 25;

            for (let i = 0; i < particleCount; i++) {
                let fw = document.createElement('div');
                fw.className = 'firework';
                fw.style.left = clientX + 'px';
                fw.style.top = clientY + 'px';
                fw.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                
                let angle = Math.random() * Math.PI * 2;
                let distance = 40 + Math.random() * 120;
                let tx = Math.cos(angle) * distance;
                let ty = Math.sin(angle) * distance;
                
                fw.style.setProperty('--tx', tx + 'px');
                fw.style.setProperty('--ty', ty + 'px');
                
                document.body.appendChild(fw);
                setTimeout(() => { fw.remove(); }, 800);
            }
        }

        // 3. ฟังก์ชันสร้างดาวตกและหัวใจ (จำนวนพอดี ไม่ลายตา)
        function createFallingBackgroundItem() {
            let item = document.createElement('div');
            item.className = 'falling-object';
            
            if (Math.random() > 0.5) {
                item.innerHTML = '❤️';
                item.style.fontSize = (10 + Math.random() * 12) + 'px';
            } else {
                item.innerHTML = '✨';
                item.style.fontSize = (12 + Math.random() * 12) + 'px';
            }

            item.style.left = Math.random() * window.innerWidth + 'px';
            item.style.top = '-40px';
            
            let duration = 2.5 + Math.random() * 2.5;
            item.style.animationDuration = duration + 's';
            
            document.body.appendChild(item);
            setTimeout(() => {
                item.remove();
            }, duration * 1000);
        }

        // พลุออโต้ฉากหลัง
        setInterval(() => {
            let randomX = Math.random() * window.innerWidth;
            let randomY = Math.random() * (window.innerHeight * 0.65);
            createFireworks(randomX, randomY);
        }, 500);

        // ปล่อยดาวตกและหัวใจแบบพอดีตา
        setInterval(() => {
            createFallingBackgroundItem();
        }, 250);

        // 4. แตะหน้าจอ (พลุ + เสียงสั้นแบบเดิมสมจริง + กระจายรูป)
        let hideTimeout;
        document.body.addEventListener('click', (e) => {
            scatterItems.forEach(item => {
                let x = item.dataset.x;
                let y = item.dataset.y;
                let rot = (Math.random() - 0.5) * 45;
                item.style.transform = `translate(-50%, -50%) translate(${x}px, ${y}px) scale(1) rotate(${rot}deg)`;
                item.style.opacity = '1';
            });

            let posX = e.clientX || window.innerWidth / 2;
            let posY = e.clientY || window.innerHeight / 2;
            
            createFireworks(posX, posY);
            setTimeout(() => createFireworks(posX - 40, posY - 30), 100);
            
            playFireworkSound();

            clearTimeout(hideTimeout);
            hideTimeout = setTimeout(() => {
                scatterItems.forEach(item => {
                    item.style.transform = `translate(-50%, -50%) translate(0px, 0px) scale(0.1)`;
                    item.style.opacity = '0';
                });
            }, 2000);
        });
    </script>

</body>
</html>
