<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Surprise</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #ff69b4;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            cursor: pointer;
            position: relative;
        }

        /* --- โครงสร้างรูปหัวใจตัวอักษรแบบต้นฉบับ (ข้อความวิ่ง/ขยับเต้น) --- */
        .heart-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: heartbeat 1.2s infinite ease-in-out;
        }

        .t {
            position: absolute;
            font-size: 13px;
            color: #ff8da1;
            text-shadow: 0 0 8px #ff69b4;
            white-space: nowrap;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* --- ข้อความแตะหน้าจอ --- */
        .tap-text {
            position: absolute;
            bottom: 90px;
            font-size: 1.2rem;
            color: #ff69b4;
            animation: pulse 1.5s infinite;
            text-align: center;
            z-index: 50;
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 1; }
            100% { opacity: 0.3; }
        }

        /* --- รูปภาพที่จะลอยพุ่งออกมาตอนกดหน้าจอ --- */
        .floating-photo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 75px;
            height: 75px;
            border-radius: 50%;
            border: 2px solid #fff;
            box-shadow: 0 0 15px #ff69b4;
            opacity: 0;
            animation: floatOut 3.5s linear forwards;
            object-fit: cover;
            z-index: 100;
        }

        @keyframes floatOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.3);
            }
            20% { opacity: 1; }
            100% {
                opacity: 0;
                transform: translate(calc(-50% + var(--move-x)), calc(-50% + var(--move-y))) scale(1.05);
            }
        }
    </style>
</head>
<body>

    <div class="heart-container" id="heartContainer">
        <div class="t" style="transform: translate(0px, -90px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(-55px, -65px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(55px, -65px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(-95px, -25px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(95px, -25px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(-80px, 20px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(80px, 20px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(-50px, 65px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(50px, 65px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
        <div class="t" style="transform: translate(0px, 105px);">ຮັກຫມີພູທີ່ສຸດในໂລກ ❤️</div>
    </div>

    <div class="tap-text" id="promptText">แตะหน้าจอ ❤️</div>

    <script>
        const promptText = document.getElementById('promptText');
        
        // ลิงก์รูปภาพที่จะสุ่มลอยออกมา (สามารถเปลี่ยนลิงก์รูปภาพของคุณตรงนี้ได้เลย)
        const photoUrls = [
            'https://i.imgur.com/bM9y4oP.jpeg',
            'https://i.imgur.com/2i9oGfP.jpeg',
            'https://i.imgur.com/f0C3rJj.jpeg',
            'https://i.imgur.com/L2nU3vD.jpeg'
        ];

        // เมื่อแตะหน้าจอ รูปภาพจะพุ่งกระจายออกมา
        document.body.addEventListener('click', () => {
            if (promptText.style.display !== 'none') {
                promptText.style.display = 'none'; // ซ่อนข้อความ "แตะหน้าจอ"
            }

            // แตะ 1 ครั้ง สุ่มปล่อยรูปออกมา 3 รูปพร้อมกันเพื่อความสวยงาม
            for (let i = 0; i < 3; i++) {
                createFloatingPhoto();
            }
        });

        function createFloatingPhoto() {
            const photo = document.createElement('img');
            photo.src = photoUrls[Math.floor(Math.random() * photoUrls.length)];
            photo.classList.add('floating-photo');
            
            // สุ่มทิศทางและระยะทางที่รูปจะพุ่งออกไปรอบ ๆ
            const moveX = (Math.random() - 0.5) * 650;
            const moveY = (Math.random() - 0.5) * 650;
            photo.style.setProperty('--move-x', `${moveX}px`);
            photo.style.setProperty('--move-y', `${moveY}px`);

            document.body.appendChild(photo);

            // ลบรูปทิ้งหลังแอนิเมชันจบ
            photo.addEventListener('animationend', () => {
                photo.remove();
            });
        }
    </script>

</body>
</html>
