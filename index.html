<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <style>
        body {
            background-color: #000;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .heart-wrapper {
            position: relative;
            width: 320px;
            height: 320px;
            /* สั่งให้ทั้งรูปหัวใจหมุนรอบตัวเองและขยายเต้นไปพร้อมกัน */
            animation: spinHeart 10s linear infinite, pulse 1.2s ease-in-out infinite alternate;
        }
        .heart-item {
            position: absolute;
            font-size: 11px;
            font-weight: bold;
            color: #ff69b4;
            white-space: nowrap;
        }
        @keyframes spinHeart {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="heart-wrapper" id="heart"></div>

    <script>
        const container = document.getElementById('heart');
        let total = 32; // จำนวนคำเรียงเป็นรูปหัวใจ
        
        for (let i = 0; i < total; i++) {
            let span = document.createElement('span');
            span.className = 'heart-item';
            span.innerHTML = "ຮັກຫມີພູ❤️";
            
            // สูตรคำนวณพิกัดเส้นโค้งรูปหัวใจ
            let t = (i / total) * Math.PI * 2;
            let x = 160 + 120 * (16 * Math.sin(t)**3) / 16;
            let y = 160 - 120 * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) / 16;
            
            span.style.left = x + 'px';
            span.style.top = y + 'px';
            container.appendChild(span);
        }
    </script>

</body>
</html>
